<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hidden Button</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="bg-dark text-light">
        <header>
            <h1>Hidden Button</h1>
            <p>Plus bonus, more buttons!</p>
        </header>
        <form id="input" name="input" onsubmit="generateButtons()" method="post" class="m-5">
            <div class="input-group w-25">
                <input type="text" id="noButtons" placeholder="Number of buttons" class="form-control bg-dark text-light" name="noButtons">
                <input type="submit" class="btn btn-secondary" value="Generate">
            </div>
            <p id="invalid-text" class="form-text text-danger"></p>
        </form>
        <h3 id="success-text" class="text-center text-success"></h3>
        <div id="buttons"></div>
        <script src="script.js"></script>
    </body>
</html>
